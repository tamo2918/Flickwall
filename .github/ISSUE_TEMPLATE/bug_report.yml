name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem with Flickwall.
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "26.2"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Flickwall version or commit
      placeholder: "main / commit hash / release version"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add images from ...
        2. Press ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add screenshots, recordings, or relevant logs if available.
